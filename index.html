<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>肥🐏比价</title>
  <link rel="icon" href="./favicon.ico" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="apple-touch-icon" href="./favicon.jpg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <div class="clock" id="clock"></div>
    <h1>🐑 肥🐏比价</h1>
    <div class="top-section">
      <button class="ai-button nav-btn" onclick="location.href='./mieEat/mieEat.html'">吃啥</button>
      <button class="ai-button nav-btn" onclick="location.href='./mieGame/lianliankan.html'">游戏</button>
      <button class="ai-button nav-btn active" onclick="location.href='./index.html'">比价</button>
      <button class="ai-button nav-btn" onclick="location.href='./mieAi/mieAi.html'">聊天</button>
    </div>
    
    <div id="products">
      <div class="product">
        <div class="product-header">
          <h2>商品 A</h2>
          <button class="remove-button" onclick="removeProduct(this)">删除</button>
        </div>
        <div class="product-details">
          <label>商品价格 (円)</label>
          <input type="text" class="price" readonly placeholder="点击输入 (例如 500或10*5)" />
          <label>商品重量 (克/毫升/个)</label>
          <input type="text" class="weight" readonly placeholder="点击输入 (例如 250或50*5)" />
        </div>
      </div>
      
      <div class="product">
        <div class="product-header">
          <h2>商品 B</h2>
          <button class="remove-button" onclick="removeProduct(this)">删除</button>
        </div>
        <div class="product-details">
          <label>商品价格 (円)</label>
          <input type="text" class="price" readonly placeholder="点击输入 (例如 500或10*5)" />
          <label>商品重量 (克/毫升/个)</label>
          <input type="text" class="weight" readonly placeholder="点击输入 (例如 250或50*5)" />
        </div>
      </div>
    </div>
    
    <div class="action-group">
      <button class="add-button" onclick="addProduct()">➕ 添加商品</button>
      <button class="calculate-button" onclick="calculate()">🚀 计算结果</button>
      <button class="clear-button" onclick="clearForm()">🗑️ 清除表单</button>
    </div>
    
    <div class="result" id="result"></div>
    <p class="footer-text">2024年6月6日 V3.0 (专属计算器键盘版)</p>
  </div>

  <div id="custom-keyboard" class="keyboard">
    <div class="kb-row">
      <div class="kb-key" data-val="7">7</div>
      <div class="kb-key" data-val="8">8</div>
      <div class="kb-key" data-val="9">9</div>
      <div class="kb-key kb-op" data-val="/">÷</div>
    </div>
    <div class="kb-row">
      <div class="kb-key" data-val="4">4</div>
      <div class="kb-key" data-val="5">5</div>
      <div class="kb-key" data-val="6">6</div>
      <div class="kb-key kb-op" data-val="*">×</div>
    </div>
    <div class="kb-row">
      <div class="kb-key" data-val="1">1</div>
      <div class="kb-key" data-val="2">2</div>
      <div class="kb-key" data-val="3">3</div>
      <div class="kb-key kb-op" data-val="-">-</div>
    </div>
    <div class="kb-row">
      <div class="kb-key" data-val="0">0</div>
      <div class="kb-key" data-val=".">.</div>
      <div class="kb-key kb-action" data-val="C">清空</div>
      <div class="kb-key kb-op" data-val="+">+</div>
    </div>
    <div class="kb-row">
      <div class="kb-key kb-del" data-val="DEL" style="flex: 1;">退格</div>
      <div class="kb-key kb-confirm" data-val="OK" style="flex: 1;">确认 (计算)</div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>

</html>
